services:
  - type: worker
    name: flight-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python tracker.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: "30"